version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: support-app-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: support_db
      MYSQL_USER: agent
      MYSQL_PASSWORD: agentpassword
    ports:
      - "3306:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
